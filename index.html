
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZIA OS</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#020617;
    color:white;
    font-family:Arial,sans-serif;
}

h1{
    font-size:72px;
    margin-bottom:10px;
}

.subtitle{
    color:#cbd5e1;
    margin-bottom:40px;
}

.card{
    background:#07122b;
    border-radius:24px;
    padding:30px;
    margin-bottom:30px;
}

select{
    width:100%;
    padding:20px;
    border-radius:16px;
    background:#1e293b;
    color:white;
    border:2px solid #475569;
    font-size:22px;
}

.summary{
    font-size:26px;
    line-height:1.6;
    color:#e2e8f0;
}

.connections{
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    gap:14px;
}

.tag{
    background:#1e293b;
    padding:14px 20px;
    border-radius:14px;
    font-size:20px;
}

@media(max-width:768px){

    body{
        padding:20px;
    }

    h1{
        font-size:54px;
    }

    .summary{
        font-size:20px;
    }

    .tag{
        font-size:16px;
    }
}

</style>
</head>

<body>

<h1>ZIA OS</h1>

<div class="subtitle">
Recursive Civilization Cognition Environment
</div>

<div class="card">

<h2>Select Node</h2>

<select id="nodeSelector"></select>

</div>

<div class="card">

<h2>Node Summary</h2>

<div id="summary" class="summary"></div>

<h2 style="margin-top:40px;">Connected Systems</h2>

<div id="connections" class="connections"></div>

</div>

<script>

let ziaData = {};

async function loadData(){

    const response = await fetch("data.json");
    ziaData = await response.json();

    const selector = document.getElementById("nodeSelector");

    Object.keys(ziaData).forEach(node => {

        const option = document.createElement("option");
        option.value = node;
        option.textContent = node;

        selector.appendChild(option);

    });

    selector.addEventListener("change", () => {
        renderNode(selector.value);
    });

    renderNode(Object.keys(ziaData)[0]);

}

function renderNode(node){

    const data = ziaData[node];

    document.getElementById("summary").innerText = data.summary;

    const container = document.getElementById("connections");

    container.innerHTML = "";

    data.connections.forEach(item => {

        const tag = document.createElement("div");

        tag.className = "tag";

        tag.innerText = item;

        container.appendChild(tag);

    });

}

loadData();

</script>

</body>
</html>
