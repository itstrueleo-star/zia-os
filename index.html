
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZIA OS</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:320px;
background:#04153a;
padding:20px;
overflow-y:auto;
border-right:1px solid #1e293b;
}

.content{
flex:1;
padding:40px;
overflow-y:auto;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-top:25px;
margin-bottom:10px;
color:#cbd5e1;
}

.node{
background:#1e293b;
padding:16px;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
transition:0.2s;
}

.node:hover{
background:#334155;
}

.card{
background:#07245c;
padding:30px;
border-radius:24px;
max-width:700px;
}

.subsection{
background:#0f172a;
padding:20px;
border-radius:16px;
margin-top:20px;
}

.tag{
display:inline-block;
background:#334155;
padding:10px 16px;
border-radius:14px;
margin:6px;
cursor:pointer;
transition:0.2s;
}

.tag:hover{
background:#475569;
}

#breadcrumbs{
margin-bottom:20px;
font-size:14px;
opacity:0.8;
}

.breadcrumb{
cursor:pointer;
}

.active-node{
animation:fadeSlide 0.3s ease;
}

@keyframes fadeSlide{
from{
opacity:0;
transform:translateX(20px);
}
to{
opacity:1;
transform:translateX(0px);
}
}



@media (max-width: 768px){

body{
flex-direction:column;
overflow:auto;
}

.sidebar{
width:100%;
height:auto;
border-right:none;
border-bottom:1px solid #1e293b;
padding:16px;
}

.content{
padding:16px;
width:100%;
overflow-x:hidden;
}

.card{
max-width:100%;
padding:20px;
border-radius:20px;
}

.node{
font-size:16px;
padding:14px;
}

.tag{
font-size:14px;
padding:8px 12px;
margin:4px;
}

#searchBox{
margin-bottom:20px;
font-size:16px;
}

#breadcrumbs{
font-size:12px;
line-height:1.5;
word-break:break-word;
}

h1{
font-size:22px;
}

}




@media (max-width: 768px) {

body{
overflow-x:hidden;
}

.app{
flex-direction:column !important;
height:auto !important;
}

.sidebar{
width:100% !important;
height:auto !important;
border-right:none !important;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.content{
width:100% !important;
padding:20px !important;
box-sizing:border-box;
}

.node-card{
width:100% !important;
box-sizing:border-box;
}

#searchBox{
font-size:18px !important;
padding:18px !important;
width:100% !important;
box-sizing:border-box;
}

.node{
font-size:18px !important;
padding:20px !important;
}

.tag{
font-size:16px !important;
padding:14px 18px !important;
margin:6px !important;
}

.breadcrumbs{
font-size:14px !important;
line-height:1.5 !important;
word-wrap:break-word !important;
}

}


</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<input
id="searchBox"
type="text"
placeholder="Search systems..."
style="
width:100%;
padding:16px;
margin-bottom:20px;
border-radius:12px;
border:none;
background:#1e293b;
color:white;
font-size:16px;
"
/>



<h1>ZIA</h1>

</div>

<div class="content active-node">

<div id="breadcrumbs"></div>

<div class="card">

<h1 id="nodeTitle">Select Node</h1>

<p id="nodeSummary"></p>

<div id="deepDive"></div>

<div id="connections"></div>

</div>

</div>

<script>


let historyStack = [];

async function loadData(){

const response = await fetch("data.json");

const data = await response.json();

window.ziaData = data;

const sidebar = document.getElementById("sidebar");

const sections = data.zia_system.sections;

Object.keys(sections).forEach(sectionKey => {

const section = sections[sectionKey];

const title = document.createElement("div");

title.className = "section-title";

title.innerText = section.title;

sidebar.appendChild(title);

if(section.nodes){

Object.keys(section.nodes).forEach(nodeKey => {

const node = section.nodes[nodeKey];

const nodeDiv = document.createElement("div");

nodeDiv.className = "node";

nodeDiv.innerText = node.title;

nodeDiv.onclick = () => renderNode(node);

sidebar.appendChild(nodeDiv);

});

}

});

}



function calculateRelatedness(nodeKey){

let scores = {};

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes){

Object.keys(section.nodes).forEach(otherKey => {

const otherNode = section.nodes[otherKey];

if(otherNode.connections &&
   otherNode.connections.includes(nodeKey)){

scores[otherKey] =
(scores[otherKey] || 0) + 1;

}

});

}

});

return Object.keys(scores);

}




function searchOntology(query){

query = query.toLowerCase();

const results = [];

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes){

Object.keys(section.nodes).forEach(nodeKey => {

const node = section.nodes[nodeKey];

const searchable =
(node.title + " " +
(node.summary || "") + " " +
(node.connections || []).join(" "))
.toLowerCase();

if(searchable.includes(query)){

results.push(node);

}

});

}

});

return results;

}


function renderNode(node, pushHistory=true){

if(pushHistory){
historyStack.push(node.title);
}

const breadcrumbContainer =
document.getElementById("breadcrumbs");

breadcrumbContainer.innerHTML = "";

historyStack.forEach((item,index)=>{

const crumb = document.createElement("span");

crumb.className = "breadcrumb";

crumb.innerText = item;

breadcrumbContainer.appendChild(crumb);

if(index < historyStack.length-1){

const sep = document.createElement("span");

sep.innerText = " > ";

breadcrumbContainer.appendChild(sep);

}

});

const content =
document.querySelector(".content");

content.classList.remove("active-node");

void content.offsetWidth;

content.classList.add("active-node");

document.getElementById("nodeTitle").innerText =
node.title;

document.getElementById("nodeSummary").innerText =
node.summary;

const deepDive =
document.getElementById("deepDive");

deepDive.innerHTML =
"<p>" + (node.deep_dive || "") + "</p>";

const connections =
document.getElementById("connections");

connections.innerHTML = "";

// ===== RELATED SYSTEMS =====

const related =
calculateRelatedness(
node.title
.toLowerCase()
.replaceAll(" ","_")
);

if(related.length > 0){

const relatedTitle =
document.createElement("h3");

relatedTitle.innerText =
"Related Systems";

connections.appendChild(relatedTitle);

related.forEach(item => {

const rel =
document.createElement("div");

rel.className = "tag";

rel.innerText =
item.replaceAll("_"," ");

rel.onclick = () => {

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes && section.nodes[item]){

renderNode(section.nodes[item]);

}

});

};

connections.appendChild(rel);

});

}

if(node.connections){

node.connections.forEach(link => {

const tag =
document.createElement("div");

tag.className = "tag";

tag.innerText =
link.replaceAll("_"," ");

tag.onclick = () => {

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes && section.nodes[link]){

renderNode(section.nodes[link]);

}

});

};

connections.appendChild(tag);

});

}

}

loadData();


document.getElementById("searchBox")
.addEventListener("input", (e) => {

const value = e.target.value;

if(value.length < 2){
return;
}

const results =
searchOntology(value);

if(results.length > 0){

renderNode(results[0]);

}

});



</script>

</body>
</html>
