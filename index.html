
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZIA OS</title>



<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#020b2d;
color:white;
overflow-x:hidden;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#02164a;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.1);
}

.content{
flex:1;
padding:24px;
overflow-y:auto;
}

.node{
background:#1e2c47;
padding:20px;
margin-bottom:14px;
border-radius:18px;
cursor:pointer;
font-size:18px;
}

.node-card{
background:#0c2a70;
padding:32px;
border-radius:24px;
max-width:850px;
}

.tag{
display:inline-block;
background:#5d6779;
padding:12px 18px;
margin:6px;
border-radius:14px;
cursor:pointer;
border:none;
color:white;
font-size:16px;
}

#searchBox{
width:100%;
padding:18px;
font-size:18px;
border-radius:16px;
border:none;
margin-bottom:24px;
background:#1e2c47;
color:white;
box-sizing:border-box;
}

.breadcrumbs{
margin-bottom:18px;
line-height:1.6;
font-size:14px;
word-break:break-word;
}

/* MOBILE FIX */

@media (max-width:768px){

.app{
flex-direction:column;
height:auto;
}

.sidebar{
width:100%;
height:auto;
border-right:none;
padding:14px;
box-sizing:border-box;
}

.content{
width:100%;
padding:14px;
box-sizing:border-box;
}

.node-card{
width:100%;
max-width:100%;
padding:22px;
box-sizing:border-box;
}

.node{
font-size:16px;
padding:18px;
}

.tag{
font-size:14px;
padding:10px 14px;
}

}

</style>



</head>

<body>

<div class="sidebar" id="sidebar">

<input
id="searchBox"
type="text"
placeholder="Search systems..."
style="
width:100%;
padding:16px;
margin-bottom:20px;
border-radius:12px;
border:none;
background:#1e293b;
color:white;
font-size:16px;
"
/>



<h1>ZIA</h1>

</div>

<div class="content active-node">

<div id="breadcrumbs"></div>

<div class="card">

<h1 id="nodeTitle">Select Node</h1>

<p id="nodeSummary"></p>

<div id="deepDive"></div>

<div id="connections"></div>

</div>

</div>

<script>


let historyStack = [];

async function loadData(){

const response = await fetch("data.json");

const data = await response.json();

window.ziaData = data;

const sidebar = document.getElementById("sidebar");

const sections = data.zia_system.sections;

Object.keys(sections).forEach(sectionKey => {

const section = sections[sectionKey];

const title = document.createElement("div");

title.className = "section-title";

title.innerText = section.title;

sidebar.appendChild(title);

if(section.nodes){

Object.keys(section.nodes).forEach(nodeKey => {

const node = section.nodes[nodeKey];

const nodeDiv = document.createElement("div");

nodeDiv.className = "node";

nodeDiv.innerText = node.title;

nodeDiv.onclick = () => renderNode(node);

sidebar.appendChild(nodeDiv);

});

}

});

}



function calculateRelatedness(nodeKey){

let scores = {};

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes){

Object.keys(section.nodes).forEach(otherKey => {

const otherNode = section.nodes[otherKey];

if(otherNode.connections &&
   otherNode.connections.includes(nodeKey)){

scores[otherKey] =
(scores[otherKey] || 0) + 1;

}

});

}

});

return Object.keys(scores);

}




function searchOntology(query){

query = query.toLowerCase();

const results = [];

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes){

Object.keys(section.nodes).forEach(nodeKey => {

const node = section.nodes[nodeKey];

const searchable =
(node.title + " " +
(node.summary || "") + " " +
(node.connections || []).join(" "))
.toLowerCase();

if(searchable.includes(query)){

results.push(node);

}

});

}

});

return results;

}


function renderNode(node, pushHistory=true){

if(pushHistory){
historyStack.push(node.title);
}

const breadcrumbContainer =
document.getElementById("breadcrumbs");

breadcrumbContainer.innerHTML = "";

historyStack.forEach((item,index)=>{

const crumb = document.createElement("span");

crumb.className = "breadcrumb";

crumb.innerText = item;

breadcrumbContainer.appendChild(crumb);

if(index < historyStack.length-1){

const sep = document.createElement("span");

sep.innerText = " > ";

breadcrumbContainer.appendChild(sep);

}

});

const content =
document.querySelector(".content");

content.classList.remove("active-node");

void content.offsetWidth;

content.classList.add("active-node");

document.getElementById("nodeTitle").innerText =
node.title;

document.getElementById("nodeSummary").innerText =
node.summary;

const deepDive =
document.getElementById("deepDive");

deepDive.innerHTML =
"<p>" + (node.deep_dive || "") + "</p>";

const connections =
document.getElementById("connections");

connections.innerHTML = "";

// ===== RELATED SYSTEMS =====

const related =
calculateRelatedness(
node.title
.toLowerCase()
.replaceAll(" ","_")
);

if(related.length > 0){

const relatedTitle =
document.createElement("h3");

relatedTitle.innerText =
"Related Systems";

connections.appendChild(relatedTitle);

related.forEach(item => {

const rel =
document.createElement("div");

rel.className = "tag";

rel.innerText =
item.replaceAll("_"," ");

rel.onclick = () => {

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes && section.nodes[item]){

renderNode(section.nodes[item]);

}

});

};

connections.appendChild(rel);

});

}

if(node.connections){

node.connections.forEach(link => {

const tag =
document.createElement("div");

tag.className = "tag";

tag.innerText =
link.replaceAll("_"," ");

tag.onclick = () => {

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes && section.nodes[link]){

renderNode(section.nodes[link]);

}

});

};

connections.appendChild(tag);

});

}

}

loadData();


document.getElementById("searchBox")
.addEventListener("input", (e) => {

const value = e.target.value;

if(value.length < 2){
return;
}

const results =
searchOntology(value);

if(results.length > 0){

renderNode(results[0]);

}

});



</script>

</body>
</html>
