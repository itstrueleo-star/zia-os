
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ZIA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#01051b;
color:white;
overflow:hidden;
}

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:340px;
background:#001b63;
padding:20px;
overflow-y:auto;
border-right:2px solid rgba(255,255,255,0.1);
}

.logo{
font-size:54px;
font-weight:bold;
margin-bottom:24px;
}

.search{
width:100%;
padding:16px;
font-size:18px;
border:none;
outline:none;
border-radius:18px;
background:#24324f;
color:white;
margin-bottom:24px;
}

.section{
margin-bottom:26px;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-bottom:12px;
}

.node{
background:#24324f;
padding:20px;
border-radius:22px;
margin-bottom:14px;
cursor:pointer;
transition:0.2s;
font-size:18px;
}

.node:hover{
background:#33476e;
transform:scale(1.02);
}

/* CONTENT */

.content{
flex:1;
overflow-y:auto;
padding:24px;
scroll-behavior:smooth;
}

#breadcrumbs{
margin-bottom:18px;
font-size:15px;
line-height:1.6;
opacity:0.7;
word-break:break-word;
}

.card{
background:#072b7a;
padding:40px;
border-radius:28px;
max-width:950px;
}

.card h1{
font-size:58px;
margin-bottom:20px;
}

.card p{
font-size:24px;
line-height:1.7;
margin-bottom:24px;
}

.related-title{
font-size:32px;
font-weight:bold;
margin-bottom:18px;
}

.tags{
display:flex;
flex-wrap:wrap;
gap:16px;
}

.tag{
border:none;
padding:16px 24px;
border-radius:18px;
background:#8d95aa;
color:white;
cursor:pointer;
font-size:20px;
transition:0.2s;
}

.tag:hover{
background:#b1bbd4;
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:768px){

body{
overflow:auto;
}

.app{
flex-direction:column;
height:auto;
}

.sidebar{
width:100%;
height:auto;
border-right:none;
border-bottom:2px solid rgba(255,255,255,0.1);
padding:16px;
}

.logo{
font-size:44px;
margin-bottom:18px;
}

.search{
font-size:20px;
padding:18px;
border-radius:20px;
margin-bottom:20px;
}

.section-title{
font-size:20px;
}

.node{
font-size:20px;
padding:22px;
border-radius:24px;
}

.content{
width:100%;
padding:16px;
overflow-y:visible;
}

.card{
width:100%;
padding:24px;
border-radius:24px;
}

.card h1{
font-size:44px;
line-height:1.2;
}

.card p{
font-size:22px;
}

.related-title{
font-size:28px;
}

.tag{
font-size:18px;
padding:14px 18px;
}

#breadcrumbs{
font-size:16px;
margin-bottom:16px;
}

}



@media(max-width:768px){

.app{
display:block !important;
height:auto !important;
}

.sidebar{
width:100% !important;
height:auto !important;
border-right:none !important;
}

.content{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#01051b;
z-index:999;
overflow-y:auto;
padding:20px;
}

.content.active{
display:block;
}

.mobile-back{
display:block;
margin-bottom:20px;
padding:14px 20px;
background:#24324f;
border:none;
color:white;
border-radius:14px;
font-size:18px;
cursor:pointer;
}

}


</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<input
id="searchInput"
class="search"
placeholder="Search systems..."
/>

<div class="logo">ZIA</div>

<div id="sidebar"></div>

</div>

<div class="content" id="contentArea">

<button class="mobile-back" id="mobileBackBtn">
← Back
</button>


<div id="breadcrumbs"></div>

<div class="card">

<h1 id="nodeTitle">Select Node</h1>

<p id="nodeSummary"></p>

<div id="deepDive"></div>

<div class="related-title">Related Systems</div>

<div class="tags" id="connections"></div>

</div>

</div>

</div>

<script>

let historyStack = [];

window.ziaData = {
zia_system:{
sections:{

zia_origins:{
title:"ZIA Origins",
nodes:{

failure_of_modern_education:{
title:"Failure of Modern Education",
summary:"Subjects disconnected from reality.",
deep_dive:"Modern education isolates knowledge into artificial categories instead of interconnected systems.",
connections:[
"psychology",
"media",
"economics",
"recursive_thinking"
]
},

recursive_thinking:{
title:"Recursive Thinking",
summary:"Everything affects everything else.",
deep_dive:"Systems evolve recursively through feedback loops across civilization.",
connections:[
"governance",
"tribal_psychology",
"media"
]
}

}
},

civilization_systems:{
title:"Civilization Systems",
nodes:{

governance:{
title:"Governance",
summary:"Collective coordination mechanisms.",
deep_dive:"Power structures emerge to stabilize complex societies.",
connections:[
"tribal_psychology",
"narrative_control",
"dopamine_feedback_loops",
"resource_scarcity"
]
},

tribal_psychology:{
title:"Tribal Psychology",
summary:"Humans evolved through tribe-based survival behavior.",
deep_dive:"Humans optimize for belonging before truth.",
connections:[
"governance",
"narrative_control",
"dopamine_feedback_loops"
]
},

dopamine_feedback_loops:{
title:"Dopamine Feedback Loops",
summary:"Digital systems exploit reward circuitry.",
deep_dive:"Algorithms weaponize attention through intermittent rewards.",
connections:[
"governance",
"tribal_psychology",
"psychology",
"media"
]
},

narrative_control:{
title:"Narrative Control",
summary:"Power systems shape collective perception.",
deep_dive:"Narratives regulate civilization-scale coordination.",
connections:[
"governance",
"tribal_psychology",
"dopamine_feedback_loops",
"psychology",
"media"
]
},

psychology:{
title:"Psychology",
summary:"Human behavior operating system.",
deep_dive:"Civilizations emerge from collective psychology.",
connections:[
"media",
"economics",
"tribal_psychology"
]
},

economics:{
title:"Economics",
summary:"Resource coordination system.",
deep_dive:"Economics governs scarcity and incentives.",
connections:[
"media",
"civilization",
"governance"
]
},

media:{
title:"Media",
summary:"Attention architecture of civilization.",
deep_dive:"Media controls emotional synchronization across society.",
connections:[
"narrative_control",
"psychology",
"dopamine_feedback_loops"
]
},

civilization:{
title:"Civilization",
summary:"Large scale human coordination.",
deep_dive:"Civilizations emerge from recursive systems interacting.",
connections:[
"governance",
"economics",
"media"
]
}

}
},

collapse_systems:{
title:"Collapse Systems",
nodes:{

resource_scarcity:{
title:"Resource Scarcity",
summary:"Civilizations destabilize when resources become constrained.",
deep_dive:"Scarcity amplifies conflict and institutional instability.",
connections:[
"economics",
"governance",
"civilization"
]
}

}
}

}
}
};

function renderSidebar(filter=""){

const sidebar = document.getElementById("sidebar");

sidebar.innerHTML = "";

Object.keys(window.ziaData.zia_system.sections).forEach(sectionKey=>{

const section = window.ziaData.zia_system.sections[sectionKey];

const sectionDiv = document.createElement("div");

sectionDiv.className = "section";

const title = document.createElement("div");

title.className = "section-title";

title.innerText = section.title;

sectionDiv.appendChild(title);

Object.keys(section.nodes).forEach(nodeKey=>{

const node = section.nodes[nodeKey];

if(node.title.toLowerCase().includes(filter.toLowerCase())){

const nodeDiv = document.createElement("div");

nodeDiv.className = "node";

nodeDiv.innerText = node.title;

nodeDiv.onclick = ()=>{

renderNode(node);

};

sectionDiv.appendChild(nodeDiv);

}

});

sidebar.appendChild(sectionDiv);

});

}

function renderNode(node, addToHistory=true){

if(!node) return;

if(addToHistory){

const last = historyStack[historyStack.length-1];

if(last !== node.title){
historyStack.push(node.title);
}

}

historyStack = historyStack.slice(-10);

document.getElementById("breadcrumbs").innerText =
historyStack.join(" > ");

document.getElementById("nodeTitle").innerText =
node.title;

document.getElementById("nodeSummary").innerText =
node.summary || "";

const deepDive = document.getElementById("deepDive");

deepDive.innerHTML = "";

if(node.deep_dive){

const p = document.createElement("p");

p.innerText = node.deep_dive;

deepDive.appendChild(p);

}

const connections = document.getElementById("connections");

connections.innerHTML = "";

if(node.connections){

const uniqueConnections = [...new Set(node.connections)];

uniqueConnections.forEach(link=>{

const tag = document.createElement("button");

tag.className = "tag";

tag.innerText = link.replaceAll("_"," ");

tag.onclick = ()=>{

Object.keys(window.ziaData.zia_system.sections).forEach(sectionKey=>{

const section = window.ziaData.zia_system.sections[sectionKey];

Object.keys(section.nodes).forEach(nodeKey=>{

const target = section.nodes[nodeKey];

if(
nodeKey.toLowerCase() === link.toLowerCase() ||
target.title.toLowerCase() === link.toLowerCase()
){
renderNode(target);
}

});

});

};

connections.appendChild(tag);

});

}

setTimeout(()=>{

document.getElementById("contentArea")
.scrollIntoView({
behavior:"smooth",
block:"start"
});

},100);

}

document
.getElementById("searchInput")
.addEventListener("input",(e)=>{

renderSidebar(e.target.value);

});

renderSidebar();



document.getElementById("mobileBackBtn").onclick = ()=>{

document.getElementById("contentArea")
.classList.remove("active");

window.scrollTo({
top:0,
behavior:"smooth"
});

};

const originalRenderNode = renderNode;

renderNode = function(node, addToHistory=true){

originalRenderNode(node, addToHistory);

if(window.innerWidth <= 768){

document.getElementById("contentArea")
.classList.add("active");

document.getElementById("contentArea")
.scrollTo({
top:0,
behavior:"smooth"
});

}

};


</script>

</body>
</html>
