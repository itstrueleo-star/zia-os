
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZIA OS</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:320px;
background:#04153a;
padding:20px;
overflow-y:auto;
border-right:1px solid #1e293b;
}

.content{
flex:1;
padding:40px;
overflow-y:auto;
}

.section-title{
font-size:18px;
font-weight:bold;
margin-top:25px;
margin-bottom:10px;
color:#cbd5e1;
}

.node{
background:#1e293b;
padding:16px;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
transition:0.2s;
}

.node:hover{
background:#334155;
}

.card{
background:#07245c;
padding:30px;
border-radius:24px;
max-width:700px;
}

.subsection{
background:#0f172a;
padding:20px;
border-radius:16px;
margin-top:20px;
}

.tag{
display:inline-block;
background:#334155;
padding:10px 16px;
border-radius:14px;
margin:6px;
cursor:pointer;
transition:0.2s;
}

.tag:hover{
background:#475569;
}

#breadcrumbs{
margin-bottom:20px;
font-size:14px;
opacity:0.8;
}

.breadcrumb{
cursor:pointer;
}

.active-node{
animation:fadeSlide 0.3s ease;
}

@keyframes fadeSlide{
from{
opacity:0;
transform:translateX(20px);
}
to{
opacity:1;
transform:translateX(0px);
}
}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<h1>ZIA</h1>

</div>

<div class="content active-node">

<div id="breadcrumbs"></div>

<div class="card">

<h1 id="nodeTitle">Select Node</h1>

<p id="nodeSummary"></p>

<div id="deepDive"></div>

<div id="connections"></div>

</div>

</div>

<script>


let historyStack = [];

async function loadData(){

const response = await fetch("data.json");

const data = await response.json();

window.ziaData = data;

const sidebar = document.getElementById("sidebar");

const sections = data.zia_system.sections;

Object.keys(sections).forEach(sectionKey => {

const section = sections[sectionKey];

const title = document.createElement("div");

title.className = "section-title";

title.innerText = section.title;

sidebar.appendChild(title);

if(section.nodes){

Object.keys(section.nodes).forEach(nodeKey => {

const node = section.nodes[nodeKey];

const nodeDiv = document.createElement("div");

nodeDiv.className = "node";

nodeDiv.innerText = node.title;

nodeDiv.onclick = () => renderNode(node);

sidebar.appendChild(nodeDiv);

});

}

});

}



function calculateRelatedness(nodeKey){

let scores = {};

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes){

Object.keys(section.nodes).forEach(otherKey => {

const otherNode = section.nodes[otherKey];

if(otherNode.connections &&
   otherNode.connections.includes(nodeKey)){

scores[otherKey] =
(scores[otherKey] || 0) + 1;

}

});

}

});

return Object.keys(scores);

}


function renderNode(node, pushHistory=true){

if(pushHistory){
historyStack.push(node.title);
}

const breadcrumbContainer =
document.getElementById("breadcrumbs");

breadcrumbContainer.innerHTML = "";

historyStack.forEach((item,index)=>{

const crumb = document.createElement("span");

crumb.className = "breadcrumb";

crumb.innerText = item;

breadcrumbContainer.appendChild(crumb);

if(index < historyStack.length-1){

const sep = document.createElement("span");

sep.innerText = " > ";

breadcrumbContainer.appendChild(sep);

}

});

const content =
document.querySelector(".content");

content.classList.remove("active-node");

void content.offsetWidth;

content.classList.add("active-node");

document.getElementById("nodeTitle").innerText =
node.title;

document.getElementById("nodeSummary").innerText =
node.summary;

const deepDive =
document.getElementById("deepDive");

deepDive.innerHTML =
"<p>" + (node.deep_dive || "") + "</p>";

const connections =
document.getElementById("connections");

connections.innerHTML = "";

// ===== RELATED SYSTEMS =====

const related =
calculateRelatedness(
node.title
.toLowerCase()
.replaceAll(" ","_")
);

if(related.length > 0){

const relatedTitle =
document.createElement("h3");

relatedTitle.innerText =
"Related Systems";

connections.appendChild(relatedTitle);

related.forEach(item => {

const rel =
document.createElement("div");

rel.className = "tag";

rel.innerText =
item.replaceAll("_"," ");

rel.onclick = () => {

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes && section.nodes[item]){

renderNode(section.nodes[item]);

}

});

};

connections.appendChild(rel);

});

}

if(node.connections){

node.connections.forEach(link => {

const tag =
document.createElement("div");

tag.className = "tag";

tag.innerText =
link.replaceAll("_"," ");

tag.onclick = () => {

Object.keys(window.ziaData.zia_system.sections)
.forEach(sectionKey => {

const section =
window.ziaData.zia_system.sections[sectionKey];

if(section.nodes && section.nodes[link]){

renderNode(section.nodes[link]);

}

});

};

connections.appendChild(tag);

});

}

}

loadData();

</script>

</body>
</html>
